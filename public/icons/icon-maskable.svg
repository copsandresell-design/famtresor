<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#FDE047"/>
      <stop offset="0.5" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#92400E"/>
      <stop offset="1" stop-color="#6B2A0E"/>
    </linearGradient>
    <linearGradient id="woodLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#B45309"/>
      <stop offset="1" stop-color="#8A3A10"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FEF3C7"/>
      <stop offset="0.45" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#FEF9C3"/>
      <stop offset="0.6" stop-color="#FACC15"/>
      <stop offset="1" stop-color="#CA8A04"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fond plein bord pour le masque du système -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- contenu réduit dans la zone sûre (80 % centrés) -->
  <g transform="translate(51.2 51.2) scale(0.8)">
    <ellipse cx="256" cy="424" rx="172" ry="26" fill="#7C2D12" opacity="0.35"/>

    <path d="M120 262 v-56 a136 96 0 0 1 272 0 v56 z" fill="url(#woodLid)"/>
    <path d="M146 218 a118 78 0 0 1 110 -70 v26 a92 60 0 0 0 -84 52 z" fill="#FDE68A" opacity="0.28"/>

    <rect x="120" y="252" width="272" height="164" rx="20" fill="url(#wood)"/>
    <rect x="108" y="240" width="296" height="34" rx="17" fill="url(#gold)"/>
    <rect x="156" y="150" width="30" height="266" rx="10" fill="url(#gold)"/>
    <rect x="326" y="150" width="30" height="266" rx="10" fill="url(#gold)"/>

    <rect x="222" y="236" width="68" height="88" rx="18" fill="url(#gold)"/>
    <circle cx="256" cy="272" r="13" fill="#6B2A0E"/>
    <path d="M249 276 h14 l6 26 h-26 z" fill="#6B2A0E"/>

    <g>
      <circle cx="424" cy="112" r="40" fill="url(#coin)"/>
      <circle cx="424" cy="112" r="30" fill="none" stroke="#A16207" stroke-width="4" opacity="0.55"/>
      <text x="424" y="127" font-family="Helvetica, Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#854D0E">€</text>
    </g>
    <g>
      <circle cx="84" cy="146" r="27" fill="url(#coin)"/>
      <circle cx="84" cy="146" r="19" fill="none" stroke="#A16207" stroke-width="3.5" opacity="0.55"/>
      <text x="84" y="157" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" fill="#854D0E">€</text>
    </g>

    <path d="M348 74 l8 20 21 4 -15 15 3 21 -17 -10 -18 10 4 -21 -15 -15 21 -4 z" fill="#FFFFFF" opacity="0.95"/>
    <path d="M128 84 l5 12 13 3 -9 9 2 13 -11 -6 -11 6 2 -13 -9 -9 13 -3 z" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="448" cy="210" r="7" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="66" cy="230" r="5" fill="#FFFFFF" opacity="0.7"/>
  </g>
</svg>
